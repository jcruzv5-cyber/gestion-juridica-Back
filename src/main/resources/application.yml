quarkus:
  application:
    name: Gestion Juridica
    version: 1.0.0

  # HTTP
  http:
    port: 8860
    host: localhost
    cors: true
    cors-origins: '*'
    cors-methods: GET,POST,PUT,DELETE,OPTIONS
    cors-headers: Content-Type,Authorization,X-Requested-With

  # Base de datos — PostgreSQL
  datasource:
    db-kind: postgresql
    username: postgres
    password: postgres
    jdbc:
      url: "jdbc:postgresql://localhost:5432/gestion_juridica"

  # Hibernate ORM
  hibernate-orm:
    schema-management:
      strategy: drop-and-create
    log:
      sql: false

"%dev":
  quarkus:
    datasource:
      db-kind: postgresql
      username: postgres
      password: postgres
      jdbc:
        url: "jdbc:postgresql://localhost:5432/gestion_juridica"

  # Logs
  log:
    level: INFO
    console:
      enabled: true
      format: "%d{yyyy-MM-dd HH:mm:ss} %-5p [%c{2.}] %s%e%n"

    file:
      enabled: true
      path: logs/gestion-juridica.log
      format: "%d{yyyy-MM-dd HH:mm:ss} %-5p [%c{2.}] %s%e%n"
      rotation:
        max-file-size: 5M
        max-backup-index: 5
        file-suffix: yyyy-MM-dd

  swagger-ui:
    enabled: true
    always-include: true
    path: "/swagger-ui"

mp:
  openapi:
    extensions:
      smallrye:
        info:
          title: "Gestión Jurídica API"
          version: "1.0.0"
          description: "API REST para el sistema de gestión de casos jurídicos (HU003)"
          contact:
            name: "Equipo de Desarrollo"
