quarkus:
  application:
    name: Gestion de Docentes
    version: 1.0-SNAPSHOT

  # HTTP
  http:
    port: 8860
    host: localhost
    cors:
      enabled: true
      origins: "http://localhost:4200"
      methods: GET,POST,PUT,DELETE,OPTIONS
      headers: Content-Type,Authorization,X-Requested-With,Origin,Accept


  # Base de datos
  datasource:
    db-kind: postgresql
    username: gestion_juridica_user
    password: TU_PASSWORD_RENDER
    jdbc:
      url: jdbc:postgresql://HOST_EXTERNO_RENDER:5432/gestion_juridica?sslmode=require
    devservices:
      enabled: false

  # Hibernate-hibernate-orm:
  hibernate-orm:
    schema-management:
      strategy:
        drop-and-create
    log:
      sql: true


  # Configuracion de Logs
  log:
    level: INFO
    console:
      enabled: true
      format: "%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{3.}] (%t) %s%e%n"
      dark-launch: true

    file:
      enabled: true
      path: logs/gestudiantes.log
      format: "%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{3.}] (%t) %s%e%n"
      rotation:
        max-file-size: 5M # Tamaño máximo
        max-backup-index: 5 # Archivos conservados
        file-suffix: yyyy-MM-dd #Sufijo de retación

  swagger-ui:
    enabled: true
    always-include: true
    path: "/swager-ui"
    title: "gestion juridica - Vinni"
    description: "API generado en Quarkus para gestion de gestion juridica"
    version: "V1"
    contact-name: "vinni9@gmail.com"

mp:
  openapi:
    extensions:
      smallrye:
        info:
          title: "gestion juridica"
          version: "1.1.0"
