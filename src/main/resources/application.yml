quarkus:
  application:
    name: gestion-juridica-back
    version: 1.0-SNAPSHOT

  http:
    port: 8860
    host: localhost
    cors:
      enabled: true
      origins: "http://localhost:4200"
      methods: GET,POST,PUT,DELETE,OPTIONS
      headers: Content-Type,Authorization,X-Requested-With,Origin,Accept

  datasource:
    db-kind: postgresql
    username: gestion_juridica_user
    password: VR5Ze9dU81QphN0VgZdHC7zo77hemKYX
    jdbc:
      url: jdbc:postgresql://dpg-d7t0dk0sfn5c73ag2v10-a.oregon-postgres.render.com:5432/gestion_juridica?sslmode=require
    devservices:
      enabled: false

  hibernate-orm:
    database:
      generation: update
    log:
      sql: true

  log:
    level: INFO
    console:
      enabled: true
      format: "%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{3.}] (%t) %s%e%n"
    file:
      enabled: true
      path: logs/gestion-juridica.log
      format: "%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{3.}] (%t) %s%e%n"
      rotation:
        max-file-size: 5M
        max-backup-index: 5
        file-suffix: yyyy-MM-dd

  swagger-ui:
    always-include: true
    path: /swagger-ui

  smallrye-openapi:
    path: /openapi

mp:
  openapi:
    extensions:
      smallrye:
        info:
          title: "Gestion juridica"
          version: "1.1.0"